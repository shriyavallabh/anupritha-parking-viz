<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anupritha B — Parking Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #f8fafc;
    color: #0f172a;
    min-height: 100vh;
  }
  .header { max-width: 900px; margin: 0 auto; padding: 36px 24px 20px; }
  .header h1 { font-size: 1.45rem; font-weight: 700; letter-spacing: -0.025em; }
  .header p { font-size: 0.82rem; color: #64748b; margin-top: 5px; }
  .header-divider { max-width: 900px; margin: 0 auto; padding: 0 24px; border-bottom: 1px solid #e2e8f0; }
  .map-wrap { max-width: 900px; margin: 28px auto 0; padding: 0 24px; }
  svg {
    width: 100%; height: auto; display: block;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    box-shadow: 0 1px 4px rgba(15,23,42,0.06), 0 4px 16px rgba(15,23,42,0.04);
  }
  .legend-wrap { max-width: 900px; margin: 16px auto 60px; padding: 0 24px; }
  .legend {
    display: flex; flex-wrap: wrap; gap: 8px 20px;
    padding: 12px 16px;
    background: #ffffff; border: 1px solid #e2e8f0; border-radius: 10px;
    font-size: 0.78rem; color: #475569;
  }
  .legend-item { display: flex; align-items: center; gap: 7px; font-weight: 500; }
  .legend-swatch { width: 18px; height: 18px; border-radius: 4px; border: 2px solid; flex-shrink: 0; }
  .legend-swatch.pit    { background: #dbeafe; border-color: #93c5fd; }
  .legend-swatch.vacant { background: #f8fafc; border-color: #cbd5e1; }
  .legend-swatch.conv   { background: #dcfce7; border-color: #86efac; }
  .legend-swatch.stack  { background: #fef9c3; border-color: #fcd34d; }
  .legend-swatch.puzzle { background: #ffedd5; border-color: #fdba74; }
  .legend-swatch.wc     { background: #e0f2fe; border-color: #7dd3fc; }
  @media (max-width: 560px) {
    .header, .legend-wrap { padding: 20px 14px; }
    .map-wrap { padding: 0 10px; margin-top: 18px; }
  }
</style>
</head>
<body>

<div class="header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
  <div>
    <h1>Anupritha B &mdash; Parking Plan</h1>
    <p>35 parking slots &middot; Basement layout based on official architectural drawing</p>
  </div>

</div>
<div class="header-divider"></div>

<div class="map-wrap">
  <svg id="svg" viewBox="0 0 1740 1560" preserveAspectRatio="xMidYMid meet"
       xmlns="http://www.w3.org/2000/svg">
  </svg>
</div>

<div class="legend-wrap">
  <div class="legend">
    <span class="legend-item"><span class="legend-swatch pit"></span>Pit Parkings</span>
    <span class="legend-item"><span class="legend-swatch vacant"></span>Vacant</span>
    <span class="legend-item"><span class="legend-swatch conv"></span>Conventional</span>
    <span class="legend-item"><span class="legend-swatch stack"></span>Stack Parking</span>
    <span class="legend-item"><span class="legend-swatch puzzle"></span>Puzzle Parking</span>
    <span class="legend-item"><span class="legend-swatch wc"></span>Toilet Block</span>
  </div>
  <div class="legend" style="margin-top:8px">
    <span class="legend-item" style="font-weight:600;color:#334155">Position Levels:</span>
    <span class="legend-item"><span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:18px;border-radius:5px;background:#dc2626;color:#fff;font-size:0.72rem;font-weight:700;flex-shrink:0">U</span>Upper</span>
    <span class="legend-item"><span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:18px;border-radius:5px;background:#f59e0b;color:#fff;font-size:0.72rem;font-weight:700;flex-shrink:0">M</span>Middle</span>
    <span class="legend-item"><span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:18px;border-radius:5px;background:#6366f1;color:#fff;font-size:0.72rem;font-weight:700;flex-shrink:0">B</span>Bottom</span>
    <span class="legend-item"><span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:18px;border-radius:5px;background:#22c55e;color:#fff;font-size:0.72rem;font-weight:700;flex-shrink:0">G</span>Ground (Stack)</span>
    <span class="legend-item" style="color:#94a3b8;font-style:italic">Applies to Pit &amp; Stack parkings only</span>
  </div>
</div>

<script>
// ──────────────────────────────────────────────────────────────────────────
// Anupritha B — Parking Plan  |  ViewBox 0 0 1740 1560
//
// Card dimensions sized to fit longest name "Mr Ratnaparkhi":
//   CW=210 (landscape), CH=82, circle r=25
//
// X bands:
//   0   – 260   south side zone  (260px)
//   260 – 1480  central zone     (1220px)
//   1480 – 1740 north side zone  (260px)
//
// Y bands:
//   0   – 360   back parking    (5 pit groups × 3 cards)
//   360 – 440   separator
//   440 – 1190  building + side slots  (h=750)
//   1190 – 1200 gap
//   1200 – 1500 front parking
//   1500 – 1560 front side label
// ──────────────────────────────────────────────────────────────────────────

const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}
const svg = document.getElementById('svg');
function app(e) { svg.appendChild(e); return e; }

// ── SLOT DATA ─────────────────────────────────────────────────────────────
const SLOTS = {
   1: { name:'Vacant',          flat:'Society', type:'pit'   },
   2: { name:'Vacant',          flat:'Society', type:'pit'   },
   3: { name:'Vacant',          flat:'Society', type:'pit'   },
   4: { name:'Mr Sambre',       flat:'403',     type:'pit'   },
   5: { name:'Mr Mali',         flat:'703',     type:'pit'   },
   6: { name:'Mr Ponkshe',      flat:'201',     type:'pit'   },
   7: { name:'Mr Awachat',      flat:'302',     type:'pit'   },
   8: { name:'Mr Marukumar',    flat:'101',     type:'pit'   },
   9: { name:'Mr Belgi',        flat:'301',     type:'pit'   },
  10: { name:'Mr Patil',        flat:'602',     type:'pit'   },
  11: { name:'Mr Wagal',        flat:'501',     type:'pit'   },
  12: { name:'Mrs. Mahimkar',   flat:'802',     type:'pit'   },
  13: { name:'Vacant',          flat:'Society', type:'pit'   },
  14: { name:'Mrs. Tonapi',     flat:'202',     type:'pit'   },
  15: { name:'Mrs. Kelkar',     flat:'303',     type:'pit'   },
  16: { name:'Mr. Bhosle',      flat:'502',     type:'stack' },
  17: { name:'Mr. Bhosle',      flat:'502',     type:'stack' },
  18: { name:'Mr O Marathe',    flat:'701',     type:'pit'   },
  19: { name:'Mr D Marathe',    flat:'702',     type:'pit'   },
  20: { name:'Mr Gujar',        flat:'601',     type:'pit'   },
  21: { name:'Mr Deshpande',    flat:'903',     type:'puzzle'},
  22: { name:'Mr Damle',        flat:'203',     type:'puzzle'},
  23: { name:'Mr Karulkar',     flat:'103',     type:'puzzle'},
  24: { name:'Mr Ratnaparkhi',  flat:'803',     type:'pit'   },
  25: { name:'Mr Sant',         flat:'801',     type:'pit'   },
  26: { name:'Mr Sant',         flat:'801',     type:'pit'   },
  27: { name:'Mr Bhagurkar',    flat:'503',     type:'pit'   },
  28: { name:'Mr Bhagurkar',    flat:'603',     type:'pit'   },
  29: { name:'Mr Pathak',       flat:'401',     type:'pit'   },
  30: { name:'Mr Atre',         flat:'902',     type:'pit'   },
  31: { name:'Mr Naik',         flat:'102',     type:'pit'   },
  32: { name:'Mr Naik',         flat:'102',     type:'pit'   },
  33: { name:'Mr Apte',         flat:'402',     type:'conv'  },
  34: { name:'Mr. Pethkar',     flat:'901',     type:'conv'  },
  35: { name:'Mr. Pethkar',     flat:'901',     type:'conv'  },
};

// ── POSITION DATA (U=Upper, M=Middle, B=Bottom, G=Ground) ─────────────────
// Pit parking: 3 levels (U/M/B). Stack parking: 2 levels (U/G).
// Puzzle & conventional: no position labels.
const POS = {
  // Back row pits
  1:'U',  2:'M',  3:'B',
  4:'U',  5:'M',  6:'B',
  7:'U',  8:'M',  9:'B',
  10:'U', 11:'M', 12:'B',
  13:'U', 14:'M', 15:'B',
  // Stack (south side)
  16:'U', 17:'G',
  // Front pits
  18:'U', 19:'M', 20:'B',
  // North side pits
  24:'U', 25:'M', 26:'B',
  27:'U', 28:'M', 29:'B',
  32:'U', 31:'M', 30:'B',
};
const POS_COLORS = {
  U: { bg:'#dc2626', fg:'#ffffff' },  // red — upper
  M: { bg:'#f59e0b', fg:'#ffffff' },  // amber — middle
  B: { bg:'#6366f1', fg:'#ffffff' },  // indigo — bottom
  G: { bg:'#22c55e', fg:'#ffffff' },  // green — ground
};
const POS_LABELS = { U:'Upper', M:'Middle', B:'Bottom', G:'Ground' };

// ── COLORS ────────────────────────────────────────────────────────────────
const C = {
  pit:   { cf:'#dbeafe', cs:'#93c5fd', gf:'#eff6ff' },
  conv:  { cf:'#dcfce7', cs:'#86efac', gf:'#f0fdf4' },
  stack: { cf:'#fef9c3', cs:'#fcd34d', gf:'#fffbeb' },
  puzzle:{ cf:'#ffedd5', cs:'#fdba74', gf:'#fff7ed' },
};
const CIRCLE = '#7f1d1d';
const FONT   = 'Inter,system-ui,sans-serif';

// ── CARD DIMENSIONS ───────────────────────────────────────────────────────
// CW=210 chosen to fit longest name "Mr Ratnaparkhi" at 16px with comfortable margin
const CW = 210, CH = 82;
const PAD = 12, GAP = 12;
const GW = 2*PAD + CW;         // group width = 234
function gH(n) { return 2*PAD + n*CH + (n-1)*GAP; }
// gH(1)=106  gH(2)=200  gH(3)=294

// Portrait puzzle cards — narrower, tall
const CW_P = 80, CH_P = 225;
const PUZ_GW = 2*PAD + 3*CW_P + 2*GAP;  // 288
const PUZ_GH = 2*PAD + CH_P;             // 249

// ── ZONE BOUNDARIES ───────────────────────────────────────────────────────
const SIDE_W  = 260;           // south and north side zone widths
const TOT_W   = 1740;
const CZ_X    = SIDE_W;        // central zone left  = 260
const CZ_W    = TOT_W - 2*SIDE_W; // central zone width = 1220
const CZ_MID  = CZ_X + CZ_W/2;   // = 870

// ── BACKGROUND ────────────────────────────────────────────────────────────
app(el('rect', { x:0,y:0, width:TOT_W, height:1560, fill:'#ffffff' }));

// ── BUILDING CORE ─────────────────────────────────────────────────────────
app(el('rect', { x:CZ_X, y:440, width:CZ_W, height:750,
  fill:'#f8fafc', stroke:'#e2e8f0', 'stroke-width':4 }));
app(el('text', { x:CZ_MID, y:815,
  'text-anchor':'middle', 'dominant-baseline':'central',
  'font-family':FONT, 'font-size':'80', 'font-weight':'700',
  fill:'#334155' }, 'Anuprita B'));

// ── RENDER LANDSCAPE CARD ─────────────────────────────────────────────────
// Circle: r=25, cx=x+34  →  right edge of circle at x+59
// Name text: x+66 (7px gap after circle)
// Available text width: 210 − 66 − 8 (right pad) = 136px  ← fits "Mr Ratnaparkhi" at 16px
function renderCard(id, x, y) {
  const s = SLOTS[id];
  const c = C[s.type];
  const isVacant = s.name === 'Vacant';
  app(el('rect', { x, y, width:CW, height:CH, rx:10,
    fill: isVacant ? '#ffffff' : c.cf,
    stroke: isVacant ? '#cbd5e1' : c.cs, 'stroke-width':2 }));
  app(el('circle', { cx:x+34, cy:y+41, r:25, fill:CIRCLE }));
  app(el('text', { x:x+34, y:y+41,
    'text-anchor':'middle', 'dominant-baseline':'central',
    'font-family':FONT, 'font-size':'26', 'font-weight':'700',
    fill:'#ffffff' }, String(id)));
  app(el('text', { x:x+66, y:y+27,
    'text-anchor':'start', 'dominant-baseline':'central',
    'font-family':FONT, 'font-size':'16', 'font-weight':'600',
    fill: isVacant ? '#64748b' : '#1e293b' }, s.name));
  app(el('text', { x:x+66, y:y+56,
    'text-anchor':'start', 'dominant-baseline':'central',
    'font-family':FONT, 'font-size':'14', 'font-weight':'400',
    fill:'#dc2626' }, '[' + s.flat + ']'));
  // Position badge (U/M/B/G) for pit & stack parkings
  const pos = POS[id];
  if (pos) {
    const pc = POS_COLORS[pos];
    const bw = 28, bh = 20, bx = x + CW - bw - 6, by = y + 6;
    app(el('rect', { x:bx, y:by, width:bw, height:bh, rx:5,
      fill:pc.bg }));
    app(el('text', { x:bx + bw/2, y:by + bh/2 + 1,
      'text-anchor':'middle', 'dominant-baseline':'central',
      'font-family':FONT, 'font-size':'13', 'font-weight':'700',
      fill:pc.fg }, pos));
  }
}

// ── RENDER PORTRAIT CARD (puzzle slots 21/22/23) ──────────────────────────
function renderCardPortrait(id, x, y) {
  const s = SLOTS[id];
  const c = C.puzzle;
  app(el('rect', { x, y, width:CW_P, height:CH_P, rx:10,
    fill:c.cf, stroke:c.cs, 'stroke-width':2 }));
  app(el('circle', { cx:x+CW_P/2, cy:y+42, r:25, fill:CIRCLE }));
  app(el('text', { x:x+CW_P/2, y:y+42,
    'text-anchor':'middle', 'dominant-baseline':'central',
    'font-family':FONT, 'font-size':'26', 'font-weight':'700',
    fill:'#ffffff' }, String(id)));
  // Name + flat rotated -90° (text written upward in lower portion of card)
  const tcx = x + CW_P/2;
  const tcy = y + 154;
  const t = app(el('text', {
    transform: `rotate(-90,${tcx},${tcy})`,
    'text-anchor':'middle',
    'font-family':FONT, 'font-size':'16'
  }));
  const ts1 = document.createElementNS(NS, 'tspan');
  ts1.setAttribute('x', tcx); ts1.setAttribute('y', String(tcy - 10));
  ts1.setAttribute('font-weight', '600'); ts1.setAttribute('fill', '#1e293b');
  ts1.textContent = s.name;
  const ts2 = document.createElementNS(NS, 'tspan');
  ts2.setAttribute('x', tcx); ts2.setAttribute('y', String(tcy + 12));
  ts2.setAttribute('font-weight', '400'); ts2.setAttribute('fill', '#dc2626');
  ts2.textContent = '[' + s.flat + ']';
  t.appendChild(ts1);
  t.appendChild(ts2);
}

// ── RENDER GROUP (landscape cards stacked vertically) ────────────────────
function renderGroup(slots, gx, gy) {
  const n = slots.length;
  const gh = gH(n);
  const type = SLOTS[slots[0]].type;
  const c = C[type];
  app(el('rect', { x:gx, y:gy, width:GW, height:gh, rx:12,
    fill:c.gf, stroke:c.cs, 'stroke-width':2, 'stroke-dasharray':'8 4' }));
  slots.forEach((id, i) => {
    renderCard(id, gx + PAD, gy + PAD + i*(CH + GAP));
  });
}

// ── RENDER PUZZLE GROUP (portrait cards side-by-side) ────────────────────
function renderPuzzleGroup(slots, gx, gy) {
  const c = C.puzzle;
  app(el('rect', { x:gx, y:gy, width:PUZ_GW, height:PUZ_GH, rx:12,
    fill:c.gf, stroke:c.cs, 'stroke-width':2, 'stroke-dasharray':'8 4' }));
  slots.forEach((id, i) => {
    renderCardPortrait(id, gx + PAD + i*(CW_P + GAP), gy + PAD);
  });
}

// ── BACK ROW ──────────────────────────────────────────────────────────────
// 5 pit groups, GW=234. Available in central zone=1220.
// Total groups = 5×234=1170. Gaps between groups = (1220−1170)/6 ≈ 8px.
// gx[i] = CZ_X + 8 + i*(234+8+1)  — small even gaps
const BK_GAP  = Math.floor((CZ_W - 5*GW) / 6); // ≈8
const BK_GY   = Math.round(20 + (340 - gH(3)) / 2); // ≈ 43
[
  [13,14,15],
  [10,11,12],
  [7, 8, 9 ],
  [4, 5, 6 ],
  [1, 2, 3 ],
].forEach((slots, i) => {
  const gx = CZ_X + BK_GAP + i*(GW + BK_GAP);
  renderGroup(slots, gx, BK_GY);
});

// ── SOUTH SIDE (x = 0 – SIDE_W = 260) ────────────────────────────────────
const SOUTH_GX = Math.round((SIDE_W - GW) / 2); // (260−234)/2 = 13

// Conventional: {34, 35}
renderGroup([34,35], SOUTH_GX, 455);
// gH(2)=200; ends at y=655

// WC Block Toilet box
const WC_Y = 672, WC_H = 182;
app(el('rect', { x:SOUTH_GX, y:WC_Y, width:GW, height:WC_H, rx:10,
  fill:'#e0f2fe', stroke:'#7dd3fc', 'stroke-width':2, 'stroke-dasharray':'6 3' }));
app(el('text', {
  x: String(SOUTH_GX + GW/2), y: String(WC_Y + WC_H/2),
  transform: `rotate(-90,${SOUTH_GX + GW/2},${WC_Y + WC_H/2})`,
  'text-anchor':'middle', 'dominant-baseline':'central',
  'font-family':FONT, 'font-size':'22', 'font-weight':'500',
  fill:'#0284c7'
}, 'WC Block Toilet'));

// Stack: {16, 17}
renderGroup([16,17], SOUTH_GX, 872);
// gH(2)=200; ends at y=1072

// ── NORTH SIDE (x = TOT_W−SIDE_W = 1480 – TOT_W = 1740) ─────────────────
const NORTH_GX = TOT_W - SIDE_W + Math.round((SIDE_W - GW) / 2); // 1493

// Conventional: {33}
renderGroup([33], NORTH_GX, 455);
// gH(1)=106; ends at y=561

// Pit: {32, 31, 30}
renderGroup([32,31,30], NORTH_GX, 578);
// gH(3)=294; ends at y=872

// Pit: {27, 28, 29}
renderGroup([27,28,29], NORTH_GX, 889);
// gH(3)=294; ends at y=1183

// ── FRONT ROW ─────────────────────────────────────────────────────────────
// Available in central zone: CZ_W=1220
// Widths: PitA(234)+20+Puzzle(288)+20+Lobby(240)+20+PitC(234) = 1056
// Left margin = (1220−1056)/2 = 82  →  start x = CZ_X+82 = 342
const FR_MARGIN = Math.round((CZ_W - (GW + 20 + PUZ_GW + 20 + 240 + 20 + GW)) / 2);
const FR_START  = CZ_X + FR_MARGIN; // 342

// Zone y=1200–1500 (h=300). PitGY = 1200+(300−294)/2=1203. PuzGY = 1200+(300−249)/2=1225.
const FRONT_PIT_GY = 1203;
const FRONT_PUZ_GY = 1200 + Math.round((300 - PUZ_GH) / 2); // 1225

// Pit A: {18, 19, 20}
renderGroup([18,19,20], FR_START, FRONT_PIT_GY);

// Puzzle: {21, 22, 23}
renderPuzzleGroup([21,22,23], FR_START + GW + 20, FRONT_PUZ_GY);

// Lobby Entrance
const LX = FR_START + GW + 20 + PUZ_GW + 20;
const LY = FRONT_PIT_GY, LW = 240, LH = gH(3); // 294
app(el('rect', { x:LX, y:LY, width:LW, height:LH, rx:12,
  fill:'#f0fff4', stroke:'#86efac', 'stroke-width':2, 'stroke-dasharray':'8 4' }));
app(el('text', { x:LX+LW/2, y:LY+100,
  'text-anchor':'middle', 'dominant-baseline':'central',
  'font-family':FONT, 'font-size':'36', 'font-weight':'700',
  fill:'#16a34a' }, 'Lobby'));
app(el('text', { x:LX+LW/2, y:LY+148,
  'text-anchor':'middle', 'dominant-baseline':'central',
  'font-family':FONT, 'font-size':'28', 'font-weight':'500',
  fill:'#16a34a' }, 'Entrance'));
app(el('text', { x:LX+LW/2, y:LY+215,
  'text-anchor':'middle', 'dominant-baseline':'central',
  'font-family':FONT, 'font-size':'52',
  fill:'#16a34a' }, '\u2191'));

// Pit C: {24, 25, 26}
renderGroup([24,25,26], LX + LW + 20, FRONT_PIT_GY);

// ── BOTTOM: FRONT SIDE LABEL ──────────────────────────────────────────────
app(el('line', { x1:60, y1:1510, x2:TOT_W-60, y2:1510,
  stroke:'#dc2626', 'stroke-width':2, 'stroke-dasharray':'6 4' }));
app(el('text', { x:CZ_MID, y:1538,
  'text-anchor':'middle', 'dominant-baseline':'central',
  'font-family':FONT, 'font-size':'32', 'font-weight':'700',
  fill:'#dc2626', 'letter-spacing':'2'
}, '\u2190  Front Side  \u2192'));

// ── SITE BOUNDARY ─────────────────────────────────────────────────────────
app(el('rect', { x:0,y:0, width:TOT_W, height:1560,
  fill:'none', stroke:'#cbd5e1', 'stroke-width':8 }));
</script>
</body>
</html>
