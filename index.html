<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anupritha B — Parking Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #f8fafc;
    color: #0f172a;
    min-height: 100vh;
  }

  .header {
    max-width: 780px;
    margin: 0 auto;
    padding: 36px 24px 20px;
  }
  .header h1 {
    font-size: 1.45rem;
    font-weight: 700;
    letter-spacing: -0.025em;
    color: #0f172a;
  }
  .header p {
    font-size: 0.82rem;
    color: #64748b;
    margin-top: 5px;
    font-weight: 400;
  }
  .header-divider {
    max-width: 780px;
    margin: 0 auto;
    padding: 0 24px;
    border-bottom: 1px solid #e2e8f0;
  }

  .map-wrap {
    max-width: 780px;
    margin: 28px auto 60px;
    padding: 0 24px;
  }

  svg {
    width: 100%;
    height: auto;
    display: block;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    box-shadow: 0 1px 4px rgba(15,23,42,0.06), 0 4px 16px rgba(15,23,42,0.04);
  }

  @media (max-width: 500px) {
    .header { padding: 24px 16px 14px; }
    .map-wrap { padding: 0 12px; margin-top: 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Anupritha B — Parking Plan</h1>
  <p>35 parking slots &middot; Basement layout based on official architectural drawing</p>
</div>
<div class="header-divider"></div>

<div class="map-wrap">
  <svg id="svg" viewBox="0 0 2200 3800" preserveAspectRatio="xMidYMid meet"
       xmlns="http://www.w3.org/2000/svg">
  </svg>
</div>

<script>
// ============================================================
// COORDINATE SYSTEM — 1 SVG unit = 1 cm, 100 units = 1 metre
// ViewBox: 2200 × 3800
//
// ALL individual slot boxes are a uniform 200 × 200.
// Stacked parking groups (multi-level hydraulic) show as a single
// column of 200 × 200 boxes stacked vertically with dividers.
//
// Back row uses a 3-row × 5-column grid so each of the 15 pit
// slots gets the same 200 × 200 box as every other slot.
//
// Y bands:
//   0–194    back driveway
//   200–820  back parking  (3 rows: y=200, 410, 620)
//   860–940  bund wall
//   940–2800 building zone
//   2800–928 front driveway
//   2940–560 front parking
// ============================================================

const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}
const svg = document.getElementById('svg');
function app(e) { svg.appendChild(e); return e; }

// ─── STYLES ───────────────────────────────────────────────
app(el('style', {}, `
  .bg        { fill: #ffffff; }
  .site-bnd  { fill: none; stroke: #cbd5e1; stroke-width: 18; }
  .dwy       { fill: #f8fafc; }
  .dwy-txt   { font: 600 54px/1 Inter,system-ui; fill: #94a3b8; letter-spacing: 5px; }
  .bund      { fill: url(#hatch); stroke: #e2e8f0; stroke-width: 6; }
  .bldg-bg   { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 18; }
  .bldg-name { font: 700 105px/1 Inter,system-ui; fill: #334155; letter-spacing: 1px; }
  .bldg-sub  { font: 400 58px/1 Inter,system-ui; fill: #94a3b8; }
  .pg-pit    { fill: #eff6ff; stroke: #93c5fd; stroke-width: 10; stroke-dasharray: 26 13; }
  .pg-conv   { fill: #f0fdf4; stroke: #86efac; stroke-width: 10; stroke-dasharray: 26 13; }
  .pg-stack  { fill: #fffbeb; stroke: #fbbf24; stroke-width: 10; stroke-dasharray: 26 13; }
  .pg-puzzle { fill: #f5f3ff; stroke: #a78bfa; stroke-width: 10; stroke-dasharray: 26 13; }
  .slot-r    { fill: #ffffff; stroke: #94a3b8; stroke-width: 14; }
  .slot-n    { font: 700 72px/1 Inter,system-ui; fill: #1e293b; }
  .zlbl      { font: 700 62px/1 Inter,system-ui; fill: #94a3b8; letter-spacing: 6px; }
  .stk-div   { stroke: #cbd5e1; stroke-width: 5; stroke-dasharray: 14 7; }
`));

// ─── HATCH PATTERN ────────────────────────────────────────
const defs = el('defs', {});
const pat  = el('pattern', { id:'hatch', width:22, height:22,
                              patternUnits:'userSpaceOnUse', patternTransform:'rotate(45)' });
pat.appendChild(el('line', { x1:0, y1:0, x2:0, y2:22, stroke:'#cbd5e1', 'stroke-width':5 }));
defs.appendChild(pat);
app(defs);

// ─── BACKGROUND ───────────────────────────────────────────
app(el('rect', { x:0, y:0, width:2200, height:3800, class:'bg' }));

// ─── BACK DRIVEWAY ────────────────────────────────────────
app(el('rect', { x:0, y:0, width:2200, height:194, class:'dwy' }));
app(el('text', { x:1100, y:108, class:'dwy-txt', 'text-anchor':'middle',
                 'dominant-baseline':'central' }, 'ELEVATION-3  —  DRIVE WAY'));

// ─── BUND WALL ────────────────────────────────────────────
app(el('rect', { x:300, y:860, width:1600, height:80, class:'bund' }));

// ─── BUILDING CORE ────────────────────────────────────────
app(el('rect', { x:300, y:940, width:1600, height:1860, class:'bldg-bg' }));
app(el('text', { x:1100, y:1840, class:'bldg-name',
                 'text-anchor':'middle', 'dominant-baseline':'central' }, 'ANUPRITHA B'));
app(el('text', { x:1100, y:1965, class:'bldg-sub',
                 'text-anchor':'middle', 'dominant-baseline':'central' }, 'Residential Building'));

// ─── FRONT DRIVEWAY ───────────────────────────────────────
app(el('rect', { x:0, y:2800, width:2200, height:128, class:'dwy' }));
app(el('text', { x:1100, y:2867, class:'dwy-txt', 'text-anchor':'middle',
                 'dominant-baseline':'central' }, 'DRIVE WAY  —  FRONT ENTRY'));

// ─── RENDER HELPERS ───────────────────────────────────────

// Uniform 200 × 200 slot box with centred number
function renderSlot(id, x, y) {
  app(el('rect', { x, y, width:200, height:200, class:'slot-r', rx:6 }));
  app(el('text', { x:x+100, y:y+100, class:'slot-n',
                   'text-anchor':'middle', 'dominant-baseline':'central' }, id));
}

// Stacked parking: n × 200 column with dividers (each level = 200 × 200)
function renderStack(ids, x, y, type) {
  const n = ids.length;
  const totalH = n * 200 + (n - 1) * 10;
  app(el('rect', { x:x-10, y:y-10, width:220, height:totalH+20, class:`pg-${type}`, rx:10 }));
  ids.forEach((id, i) => renderSlot(id, x, y + i * 210));
  for (let i = 1; i < n; i++) {
    const dy = y + i * 210 - 5;
    app(el('line', { x1:x+10, y1:dy, x2:x+190, y2:dy, class:'stk-div' }));
  }
}

// ─── BACK ROW — 5 pit groups × 3 slots (1–15) ────────────
// Each M-3 bay (300 units) holds one column of 3 stacked boxes.
// Columns at x = 350, 650, 950, 1250, 1550 (centred in each bay).
// Rows at y = 200, 410, 620 (200 tall + 10 gap).

const BACK_COLS = [350, 650, 950, 1250, 1550];
const BACK_ROWS = [200, 410, 620];

// Group borders (one dashed blue rect per bay, wrapping all 3 rows)
BACK_COLS.forEach(cx =>
  app(el('rect', { x:cx-12, y:190, width:224, height:642, class:'pg-pit', rx:10 })));

// Slots — column-major: 1,2,3 in col 0; 4,5,6 in col 1; etc.
BACK_COLS.forEach((cx, col) => {
  BACK_ROWS.forEach((ry, row) => {
    renderSlot(col * 3 + row + 1, cx, ry);
  });
});

// ─── SOUTH SIDE (left wall, x zone 0–300) ─────────────────
// Conventional: 34, 35 — centred in the 300-wide zone (slot x=50)
app(el('rect', { x:0, y:940, width:300, height:460, class:'pg-conv', rx:10 }));
renderSlot(34, 50, 960);
renderSlot(35, 50, 1180);
// ~6 m gap (staircase / toilet block zone)
// Stack: 16 + 17
renderStack([16, 17], 50, 2120, 'stack');

// ─── NORTH SIDE (right wall, x zone 1900–2200) ────────────
// Conventional: 33 — slot x=1950
app(el('rect', { x:1900, y:940, width:300, height:250, class:'pg-conv', rx:10 }));
renderSlot(33, 1950, 960);
// Stack: 30, 31, 32
renderStack([30, 31, 32], 1950, 1250, 'stack');
// ~2 m gap
// Stack: 27, 28, 29
renderStack([27, 28, 29], 1950, 2120, 'stack');
// 2120 + 3×200 + 2×10 = 2120 + 620 = 2740 (within building zone ending 2800)

// ─── FRONT ROW ────────────────────────────────────────────
// Centred between x=300 and x=1900.
// Layout: Stack-A | gap | Puzzle-21 | Puzzle-22 | Puzzle-23 | gap | Stack-C
// Columns at x = 400, 700, 1000, 1300, 1600  (equal 300-unit spacing)

// Stack A: 18 + 19 + 20
renderStack([18, 19, 20], 400, 2940, 'stack');

// Puzzle group border + individual slots (covers x=700–1500)
app(el('rect', { x:688, y:2930, width:824, height:220, class:'pg-puzzle', rx:10 }));
renderSlot(21,  700, 2940);
renderSlot(22, 1000, 2940);
renderSlot(23, 1300, 2940);

// Stack C: 24 + 25 + 26
renderStack([24, 25, 26], 1600, 2940, 'stack');

// ─── SITE BOUNDARY ────────────────────────────────────────
app(el('rect', { x:0, y:0, width:2200, height:3800, class:'site-bnd' }));

// ─── ZONE DIRECTION LABELS ────────────────────────────────
app(el('text', { x:1100, y:148, class:'zlbl',
                 'text-anchor':'middle', 'dominant-baseline':'central' }, 'BACK SIDE'));
app(el('text', { x:1100, y:3770, class:'zlbl',
                 'text-anchor':'middle', 'dominant-baseline':'central' }, 'FRONT SIDE'));
app(el('text', { x:100, y:1900, class:'zlbl',
                 'text-anchor':'middle', 'dominant-baseline':'central',
                 transform:'rotate(-90,100,1900)' }, 'SOUTH SIDE'));
app(el('text', { x:2100, y:1900, class:'zlbl',
                 'text-anchor':'middle', 'dominant-baseline':'central',
                 transform:'rotate(90,2100,1900)' }, 'NORTH SIDE'));
</script>
</body>
</html>
