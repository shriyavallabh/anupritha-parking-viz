<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anupritha B — Parking Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #f8fafc;
    color: #0f172a;
    min-height: 100vh;
  }

  .header {
    max-width: 820px;
    margin: 0 auto;
    padding: 36px 24px 20px;
  }
  .header h1 {
    font-size: 1.45rem;
    font-weight: 700;
    letter-spacing: -0.025em;
  }
  .header p {
    font-size: 0.82rem;
    color: #64748b;
    margin-top: 5px;
  }
  .header-divider {
    max-width: 820px;
    margin: 0 auto;
    padding: 0 24px;
    border-bottom: 1px solid #e2e8f0;
  }

  .map-wrap {
    max-width: 820px;
    margin: 28px auto 0;
    padding: 0 24px;
  }

  svg {
    width: 100%;
    height: auto;
    display: block;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    box-shadow: 0 1px 4px rgba(15,23,42,0.06), 0 4px 16px rgba(15,23,42,0.04);
  }

  .legend-wrap {
    max-width: 820px;
    margin: 16px auto 60px;
    padding: 0 24px;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 20px;
    padding: 12px 16px;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    font-size: 0.78rem;
    color: #475569;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-weight: 500;
  }

  .legend-swatch {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 2px solid;
    flex-shrink: 0;
  }

  .legend-swatch.pit     { background: #dbeafe; border-color: #93c5fd; }
  .legend-swatch.vacant  { background: #f8fafc; border-color: #cbd5e1; }
  .legend-swatch.conv    { background: #dcfce7; border-color: #86efac; }
  .legend-swatch.stack   { background: #fef9c3; border-color: #fcd34d; }
  .legend-swatch.puzzle  { background: #ffedd5; border-color: #fdba74; }

  @media (max-width: 520px) {
    .header, .legend-wrap { padding: 20px 14px; }
    .map-wrap { padding: 0 10px; margin-top: 18px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Anupritha B — Parking Plan</h1>
  <p>35 parking slots &middot; Basement layout based on official architectural drawing</p>
</div>
<div class="header-divider"></div>

<div class="map-wrap">
  <svg id="svg" viewBox="0 0 1440 1480" preserveAspectRatio="xMidYMid meet"
       xmlns="http://www.w3.org/2000/svg">
  </svg>
</div>

<div class="legend-wrap">
  <div class="legend">
    <span class="legend-item"><span class="legend-swatch pit"></span>Pit Parking</span>
    <span class="legend-item"><span class="legend-swatch vacant"></span>Vacant</span>
    <span class="legend-item"><span class="legend-swatch conv"></span>Conventional Parking</span>
    <span class="legend-item"><span class="legend-swatch stack"></span>Stack Parking</span>
    <span class="legend-item"><span class="legend-swatch puzzle"></span>Puzzle Parking</span>
  </div>
</div>

<script>
// ============================================================
// Anupritha B — Parking Plan
// ViewBox: 1440 × 1480
//
// Y bands:
//   0–100    back driveway
//   100–380  back parking (5 pit groups × 3 cards)
//   380–460  bund wall
//   460–1100 building zone + side slots
//   1100–160 front driveway
//   1160–440 front parking
//   1440–480 FRONT SIDE label
//
// X bands:
//   0–230    south side zone
//   230–1210 central zone (building + back + front)
//   1210–440 north side zone
// ============================================================

const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}
const svg = document.getElementById('svg');
function app(e) { svg.appendChild(e); return e; }

// ─── CARD & GROUP CONSTANTS ───────────────────────────────────────
const CW = 170, CH = 68; // landscape card: width, height
const CW_P = 72, CH_P = 210; // portrait (puzzle) card dimensions
const PAD = 12, GAP = 12; // group padding + inter-card gap

// Computed group dimensions for n landscape cards
function gH(n) { return 2*PAD + n*CH + (n-1)*GAP; } // group height
const GW = 2*PAD + CW; // group width = 194

// Puzzle group dimensions (3 portrait cards side-by-side)
const PUZ_N = 3;
const PUZ_GW = 2*PAD + PUZ_N*CW_P + (PUZ_N-1)*GAP; // = 264
const PUZ_GH = 2*PAD + CH_P;                         // = 234

// ─── TYPE COLORS ─────────────────────────────────────────────────
const C = {
  pit:   { cf:'#dbeafe', cs:'#93c5fd', gf:'#eff6ff' },
  conv:  { cf:'#dcfce7', cs:'#86efac', gf:'#f0fdf4' },
  stack: { cf:'#fef9c3', cs:'#fcd34d', gf:'#fffbeb' },
  puzzle:{ cf:'#ffedd5', cs:'#fdba74', gf:'#fff7ed' },
};

// Number circle fill (dark maroon, matching reference image)
const CIRCLE_FILL = '#7f1d1d';

// Font shorthand for SVG text
const FONT = 'Inter,system-ui,sans-serif';

// ─── DEFS (hatch for bund wall) ───────────────────────────────────
const defs = el('defs', {});
const pat = el('pattern', { id:'hatch', width:16, height:16,
  patternUnits:'userSpaceOnUse', patternTransform:'rotate(45)' });
pat.appendChild(el('line', { x1:0,y1:0, x2:0,y2:16,
  stroke:'#cbd5e1', 'stroke-width':4 }));
defs.appendChild(pat);
app(defs);

// ─── BACKGROUND ──────────────────────────────────────────────────
app(el('rect', { x:0,y:0, width:1440,height:1480, fill:'#ffffff' }));

// ─── BACK DRIVEWAY STRIP (y = 0 – 100) ──────────────────────────
app(el('rect', { x:0,y:0, width:1440,height:100, fill:'#f8fafc' }));
app(el('text', { x:720, y:38,
  'text-anchor':'middle', 'dominant-baseline':'central',
  'font-family':FONT, 'font-size':'40', 'font-weight':'700',
  fill:'#64748b', 'letter-spacing':'5' }, 'BACK SIDE'));
app(el('text', { x:720, y:80,
  'text-anchor':'middle', 'dominant-baseline':'central',
  'font-family':FONT, 'font-size':'26', 'font-weight':'600',
  fill:'#94a3b8', 'letter-spacing':'3' }, 'ELEVATION-3  —  DRIVE WAY'));

// ─── BUND WALL (y = 380 – 460) ───────────────────────────────────
app(el('rect', { x:230, y:393, width:980, height:50,
  fill:'url(#hatch)', stroke:'#e2e8f0', 'stroke-width':2 }));

// ─── BUILDING CORE (x=230, y=460, w=980, h=640) ──────────────────
app(el('rect', { x:230, y:460, width:980, height:640,
  fill:'#f8fafc', stroke:'#e2e8f0', 'stroke-width':6 }));
app(el('text', { x:720, y:755,
  'text-anchor':'middle', 'dominant-baseline':'central',
  'font-family':FONT, 'font-size':'82', 'font-weight':'700',
  fill:'#334155', 'letter-spacing':'1' }, 'ANUPRITHA B'));
app(el('text', { x:720, y:845,
  'text-anchor':'middle', 'dominant-baseline':'central',
  'font-family':FONT, 'font-size':'44', 'font-weight':'400',
  fill:'#94a3b8' }, 'Residential Building'));

// ─── FRONT DRIVEWAY STRIP (y = 1100 – 1160) ─────────────────────
app(el('rect', { x:0,y:1100, width:1440,height:60, fill:'#f8fafc' }));
app(el('text', { x:720, y:1130,
  'text-anchor':'middle', 'dominant-baseline':'central',
  'font-family':FONT, 'font-size':'26', 'font-weight':'600',
  fill:'#94a3b8', 'letter-spacing':'3' }, 'DRIVE WAY  —  FRONT ENTRY'));

// ─── RENDER HELPERS ──────────────────────────────────────────────

// Single landscape card (w=CW, h=CH) with dark circle + white number
function renderCard(id, x, y, type) {
  const c = C[type];
  app(el('rect', { x, y, width:CW, height:CH, rx:10,
    fill:c.cf, stroke:c.cs, 'stroke-width':2 }));
  app(el('circle', { cx:x+38, cy:y+CH/2, r:26, fill:CIRCLE_FILL }));
  app(el('text', { x:x+38, y:y+CH/2,
    'text-anchor':'middle', 'dominant-baseline':'central',
    'font-family':FONT, 'font-size':'30', 'font-weight':'700',
    fill:'#ffffff' }, String(id)));
}

// Single portrait card (puzzle only — w=CW_P, h=CH_P)
function renderCardPortrait(id, x, y) {
  const c = C.puzzle;
  app(el('rect', { x, y, width:CW_P, height:CH_P, rx:10,
    fill:c.cf, stroke:c.cs, 'stroke-width':2 }));
  app(el('circle', { cx:x+CW_P/2, cy:y+38, r:26, fill:CIRCLE_FILL }));
  app(el('text', { x:x+CW_P/2, y:y+38,
    'text-anchor':'middle', 'dominant-baseline':'central',
    'font-family':FONT, 'font-size':'30', 'font-weight':'700',
    fill:'#ffffff' }, String(id)));
}

// Group of landscape cards stacked vertically
function renderGroup(slots, gx, gy, type) {
  const n = slots.length;
  const gh = gH(n);
  const c = C[type];
  app(el('rect', { x:gx, y:gy, width:GW, height:gh, rx:12,
    fill:c.gf, stroke:c.cs, 'stroke-width':2, 'stroke-dasharray':'8 4' }));
  slots.forEach((id, i) => {
    renderCard(id, gx+PAD, gy+PAD + i*(CH+GAP), type);
  });
}

// Group of portrait (puzzle) cards side-by-side
function renderPuzzleGroup(slots, gx, gy) {
  const c = C.puzzle;
  app(el('rect', { x:gx, y:gy, width:PUZ_GW, height:PUZ_GH, rx:12,
    fill:c.gf, stroke:c.cs, 'stroke-width':2, 'stroke-dasharray':'8 4' }));
  slots.forEach((id, i) => {
    renderCardPortrait(id, gx+PAD + i*(CW_P+GAP), gy+PAD);
  });
}

// ─── BACK ROW ─────────────────────────────────────────────────────
// 5 pit groups × 3 slots, left-to-right: {13-15}, {10-12}, {7-9}, {4-6}, {1-3}
// Groups span x=235–1205, centered in back zone y=100–380 (group h=252)
// gY = 100 + (280 - 252) / 2 = 114
const backGY = 114;
[
  { slots:[13,14,15], gx:235 },
  { slots:[10,11,12], gx:429 },
  { slots:[7,8,9],    gx:623 },
  { slots:[4,5,6],    gx:817 },
  { slots:[1,2,3],    gx:1011 },
].forEach(({slots,gx}) => renderGroup(slots, gx, backGY, 'pit'));

// ─── SOUTH SIDE (left wall, x zone 0–230) ─────────────────────────
// Groups centred in 230px zone: gx = (230–194)/2 = 18
const SOUTH_GX = 18;
renderGroup([34,35], SOUTH_GX, 475, 'conv');  // conv group, ends y=647
// ~235px gap = staircase / toilet block zone
renderGroup([16,17], SOUTH_GX, 882, 'stack'); // stack group, ends y=1054

// ─── NORTH SIDE (right wall, x zone 1210–1440) ────────────────────
// Groups centred in 230px zone: gx = 1210 + (230–194)/2 = 1228
const NORTH_GX = 1228;
renderGroup([33], NORTH_GX, 475, 'conv');          // conv, single, ends y=567
renderGroup([30,31,32], NORTH_GX, 590, 'pit');     // pit group, ends y=842
renderGroup([27,28,29], NORTH_GX, 848, 'pit');     // pit group, ends y=1100

// ─── FRONT ROW ────────────────────────────────────────────────────
// Layout centred in x=230–1210 (980px):
//   PitA(194) + 20 + Puzzle(264) + 20 + Lobby(240) + 20 + PitC(194) = 952
//   Margin each side = (980–952)/2 = 14 → start x=244
// Groups centred in front zone y=1160–1440 (280px):
//   Pit groups h=252 → gY = 1160 + (280–252)/2 = 1174
//   Puzzle group h=234 → gY = 1160 + (280–234)/2 = 1183
const FRONT_PIT_GY  = 1174;
const FRONT_PUZ_GY  = 1183;

// Pit A: 18, 19, 20
renderGroup([18,19,20], 244, FRONT_PIT_GY, 'pit');

// Puzzle: 21, 22, 23
renderPuzzleGroup([21,22,23], 458, FRONT_PUZ_GY);

// Lobby dashed box (same height as 3-card group = 252)
app(el('rect', { x:742, y:FRONT_PIT_GY, width:240, height:252, rx:12,
  fill:'#f8fafc', stroke:'#cbd5e1', 'stroke-width':2, 'stroke-dasharray':'8 4' }));
app(el('text', { x:862, y:FRONT_PIT_GY+100,
  'text-anchor':'middle', 'dominant-baseline':'central',
  'font-family':FONT, 'font-size':'36', 'font-weight':'600',
  fill:'#94a3b8' }, 'Lobby'));
app(el('text', { x:862, y:FRONT_PIT_GY+150,
  'text-anchor':'middle', 'dominant-baseline':'central',
  'font-family':FONT, 'font-size':'28', 'font-weight':'400',
  fill:'#cbd5e1' }, '(Building Entry)'));

// Pit C: 24, 25, 26
renderGroup([24,25,26], 1002, FRONT_PIT_GY, 'pit');

// ─── SITE BOUNDARY ────────────────────────────────────────────────
app(el('rect', { x:0,y:0, width:1440,height:1480, fill:'none',
  stroke:'#cbd5e1', 'stroke-width':10 }));

// ─── ZONE LABELS ──────────────────────────────────────────────────
// FRONT SIDE — bottom strip
app(el('text', { x:720, y:1458,
  'text-anchor':'middle', 'dominant-baseline':'central',
  'font-family':FONT, 'font-size':'40', 'font-weight':'700',
  fill:'#64748b', 'letter-spacing':'5' }, 'FRONT SIDE'));

// SOUTH SIDE — rotated left edge (x=15 keeps it off slot boxes at x=18+)
app(el('text', { x:15, y:780, transform:'rotate(-90,15,780)',
  'text-anchor':'middle', 'dominant-baseline':'central',
  'font-family':FONT, 'font-size':'40', 'font-weight':'700',
  fill:'#64748b', 'letter-spacing':'5' }, 'SOUTH SIDE'));

// NORTH SIDE — rotated right edge
app(el('text', { x:1425, y:780, transform:'rotate(90,1425,780)',
  'text-anchor':'middle', 'dominant-baseline':'central',
  'font-family':FONT, 'font-size':'40', 'font-weight':'700',
  fill:'#64748b', 'letter-spacing':'5' }, 'NORTH SIDE'));
</script>
</body>
</html>
