<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anupritha B — Parking Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #f8fafc;
    color: #0f172a;
    min-height: 100vh;
  }

  .header {
    max-width: 780px;
    margin: 0 auto;
    padding: 36px 24px 20px;
  }
  .header h1 {
    font-size: 1.45rem;
    font-weight: 700;
    letter-spacing: -0.025em;
    color: #0f172a;
  }
  .header p {
    font-size: 0.82rem;
    color: #64748b;
    margin-top: 5px;
    font-weight: 400;
  }
  .header-divider {
    max-width: 780px;
    margin: 0 auto;
    padding: 0 24px;
    border-bottom: 1px solid #e2e8f0;
  }

  .map-wrap {
    max-width: 780px;
    margin: 28px auto 60px;
    padding: 0 24px;
  }

  svg {
    width: 100%;
    height: auto;
    display: block;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    box-shadow: 0 1px 4px rgba(15,23,42,0.06), 0 4px 16px rgba(15,23,42,0.04);
  }

  @media (max-width: 500px) {
    .header { padding: 24px 16px 14px; }
    .map-wrap { padding: 0 12px; margin-top: 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Anupritha B — Parking Plan</h1>
  <p>35 parking slots &middot; Basement layout based on official architectural drawing</p>
</div>
<div class="header-divider"></div>

<div class="map-wrap">
  <svg id="svg" viewBox="0 0 2200 3400" preserveAspectRatio="xMidYMid meet"
       xmlns="http://www.w3.org/2000/svg">
    <!-- JS-generated below -->
  </svg>
</div>

<script>
// ============================================================
// COORDINATE SYSTEM
// 1 SVG unit = 1 cm  |  100 units = 1 metre
// ViewBox: 2200 x 3400  =  22m wide x 34m deep
//
// Derived from blueprint dimension markers:
//   Back width  = 5 bays x M-3 (300 units) = 1500 units
//   South depth = 300 units (3m, one conventional bay)
//   North depth = 300 units (3m, one conventional bay)
//   Total width = 300 + 1500 + 300 + padding = 2200
//   Back parking (h=500) + bund (h=100) + building (h=1920) +
//   driveway (h=130) + front parking (h=500) + margins = 3400
// ============================================================

const NS = 'http://www.w3.org/2000/svg';

function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}

const svg = document.getElementById('svg');
function app(e) { svg.appendChild(e); return e; }

// ─── STYLES ───────────────────────────────────────────────
app(el('style', {}, `
  .bg        { fill: #ffffff; }
  .site-bnd  { fill: none; stroke: #cbd5e1; stroke-width: 18; }
  .dwy       { fill: #f8fafc; }
  .dwy-txt   { font: 600 54px/1 Inter,system-ui; fill: #94a3b8; letter-spacing: 5px; }
  .bund      { fill: url(#hatch); stroke: #e2e8f0; stroke-width: 6; }
  .bldg-bg   { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 18; }
  .bldg-name { font: 700 105px/1 Inter,system-ui; fill: #334155; letter-spacing: 1px; }
  .bldg-sub  { font: 400 58px/1 Inter,system-ui; fill: #94a3b8; }
  .blk-bg    { fill: #f1f5f9; stroke: #e2e8f0; stroke-width: 8; }
  .blk-txt   { font: 500 46px/1 Inter,system-ui; fill: #94a3b8; }
  .pg-pit    { fill: #eff6ff; stroke: #93c5fd; stroke-width: 10; stroke-dasharray: 26 13; }
  .pg-conv   { fill: #f0fdf4; stroke: #86efac; stroke-width: 10; stroke-dasharray: 26 13; }
  .pg-stack  { fill: #fffbeb; stroke: #fbbf24; stroke-width: 10; stroke-dasharray: 26 13; }
  .pg-puzzle { fill: #f5f3ff; stroke: #a78bfa; stroke-width: 10; stroke-dasharray: 26 13; }
  .slot-r    { fill: #ffffff; stroke: #94a3b8; stroke-width: 14; }
  .slot-n    { font: 700 72px/1 Inter,system-ui; fill: #1e293b; }
  .slot-n-sm { font: 700 56px/1 Inter,system-ui; fill: #1e293b; }
  .zlbl      { font: 700 62px/1 Inter,system-ui; fill: #94a3b8; letter-spacing: 6px; }
  .pg-type   { font: 600 44px/1 Inter,system-ui; fill: #94a3b8; letter-spacing: 1px; }
`));

// ─── HATCH PATTERN ────────────────────────────────────────
const defs = el('defs', {});
const pat  = el('pattern', { id:'hatch', width:22, height:22,
                              patternUnits:'userSpaceOnUse', patternTransform:'rotate(45)' });
pat.appendChild(el('line', { x1:0, y1:0, x2:0, y2:22, stroke:'#cbd5e1', 'stroke-width':5 }));
defs.appendChild(pat);
app(defs);

// ─── BACKGROUND ───────────────────────────────────────────
app(el('rect', { x:0, y:0, width:2200, height:3400, class:'bg' }));

// ─── BACK DRIVEWAY ────────────────────────────────────────
app(el('rect', { x:0, y:0, width:2200, height:194, class:'dwy' }));
app(el('text', { x:1100, y:108, class:'dwy-txt', 'text-anchor':'middle',
                 'dominant-baseline':'central' },
       'ELEVATION-3  —  DRIVE WAY'));

// ─── BUND WALL (between back parking & building) ──────────
app(el('rect', { x:300, y:706, width:1600, height:90, class:'bund' }));

// ─── BUILDING CORE ────────────────────────────────────────
app(el('rect', { x:300, y:800, width:1600, height:1920, class:'bldg-bg' }));

// Internal building blocks
[
  [320,  828, 370, 270, 'TOILET'],
  [800,  828, 400, 270, 'STAIRCASE'],
  [820, 1170, 200, 360, 'LIFT'],
  [1400, 828, 200, 780, 'GOODS\nLIFT'],
  [720, 1760, 560, 360, 'LOBBY'],
  [700, 2240, 500, 180, 'DUCT ABOVE'],
].forEach(([x,y,w,h,label]) => {
  app(el('rect', { x, y, width:w, height:h, class:'blk-bg', rx:6 }));
  const lines = label.split('\n');
  lines.forEach((line, i) => {
    const cy = y + h/2 + (i - (lines.length-1)/2) * 58;
    app(el('text', { x:x+w/2, y:cy, class:'blk-txt',
                     'text-anchor':'middle', 'dominant-baseline':'central' }, line));
  });
});

// Building name
app(el('text', { x:1100, y:1520, class:'bldg-name',
                 'text-anchor':'middle', 'dominant-baseline':'central' },
     'ANUPRITHA B'));
app(el('text', { x:1100, y:1645, class:'bldg-sub',
                 'text-anchor':'middle', 'dominant-baseline':'central' },
     'Residential Building'));

// ─── FRONT DRIVEWAY ───────────────────────────────────────
app(el('rect', { x:0, y:2720, width:2200, height:128, class:'dwy' }));
app(el('text', { x:1100, y:2787, class:'dwy-txt', 'text-anchor':'middle',
                 'dominant-baseline':'central' },
       'DRIVE WAY  —  FRONT ENTRY'));

// Ramp indicator
app(el('text', { x:2020, y:2860, class:'pg-type', 'text-anchor':'middle' }, 'RAMP UP'));

// ─── SLOT DATA ────────────────────────────────────────────
// [id, x, y, w, h, type]
// Back: 1 SVG unit = 1cm. Pit bays: 100 wide x 500 deep. 3 slots per M-3 (300) bay.
// Sides: 300 wide (3m depth into site) x 250 tall (2.5m along wall). Rotated orientation.
// Front: 200 wide x 500 deep.
const SLOTS = [
  // BACK — 5 pit groups x 3 (slots 1-15)
  // Bay 1: x 300-600
  [1,  300,200, 100,500,'pit'],
  [2,  400,200, 100,500,'pit'],
  [3,  500,200, 100,500,'pit'],
  // Bay 2: x 600-900
  [4,  600,200, 100,500,'pit'],
  [5,  700,200, 100,500,'pit'],
  [6,  800,200, 100,500,'pit'],
  // Bay 3: x 900-1200
  [7,  900,200, 100,500,'pit'],
  [8, 1000,200, 100,500,'pit'],
  [9, 1100,200, 100,500,'pit'],
  // Bay 4: x 1200-1500
  [10,1200,200, 100,500,'pit'],
  [11,1300,200, 100,500,'pit'],
  [12,1400,200, 100,500,'pit'],
  // Bay 5: x 1500-1800
  [13,1500,200, 100,500,'pit'],
  [14,1600,200, 100,500,'pit'],
  [15,1700,200, 100,500,'pit'],

  // SOUTH SIDE (left wall) — conventional upper, stack lower
  // Slots touch left wall (x=0), depth = 300 into site
  [34,  0, 860,300,250,'conv'],
  [35,  0,1110,300,250,'conv'],
  // gap ~1000 units (toilet block + staircase landing)
  [16,  0,2110,300,250,'stack'],
  [17,  0,2360,300,250,'stack'],

  // NORTH SIDE (right wall) — conv + pit groups + pit groups
  // Slots touch right wall at x=1900, depth = 300 into site
  [33,1900, 860,300,250,'conv'],
  // small gap after bund wall / retaining wall
  [30,1900,1060,300,250,'pit'],
  [31,1900,1310,300,250,'pit'],
  [32,1900,1560,300,250,'pit'],
  // gap: duct / goods lift zone
  [27,1900,1920,300,250,'pit'],
  [28,1900,2170,300,250,'pit'],
  [29,1900,2420,300,250,'pit'],

  // FRONT — pit + puzzle + pit
  // y=2850 (below driveway), 200 wide x 500 deep
  [18,  80,2850,200,500,'pit'],
  [19, 280,2850,200,500,'pit'],
  [20, 480,2850,200,500,'pit'],
  [21, 680,2850,200,500,'puzzle'],
  [22, 880,2850,200,500,'puzzle'],
  [23,1080,2850,200,500,'puzzle'],
  [24,1400,2850,200,500,'pit'],
  [25,1600,2850,200,500,'pit'],
  [26,1800,2850,200,500,'pit'],
];

// ─── GROUP BORDERS ────────────────────────────────────────
// [x, y, w, h, type, label]
const GROUPS = [
  // Back — 5 pit groups
  [294,194,312,512,'pit','Pit'],
  [594,194,312,512,'pit','Pit'],
  [894,194,312,512,'pit','Pit'],
  [1194,194,312,512,'pit','Pit'],
  [1494,194,312,512,'pit','Pit'],
  // South upper (34,35)
  [0,854,306,512,'conv','Conv'],
  // South lower (16,17)
  [0,2104,306,512,'stack','Stack'],
  // North: 33 single
  [1894,854,306,262,'conv','Conv'],
  // North: 30-32
  [1894,1054,306,762,'pit','Pit'],
  // North: 27-29
  [1894,1914,306,762,'pit','Pit'],
  // Front A (18-20)
  [74,2844,612,512,'pit','Pit'],
  // Front B (21-23)
  [674,2844,412,512,'puzzle','Puzzle'],
  // Front C (24-26)
  [1394,2844,612,512,'pit','Pit'],
];

// Draw groups (behind slots)
GROUPS.forEach(([x,y,w,h,type,label]) => {
  app(el('rect', { x, y, width:w, height:h, class:`pg-${type}`, rx:10 }));
  // Type label — placed just below the group top edge
  app(el('text', { x: x+w/2, y: y+50, class:'pg-type',
                   'text-anchor':'middle', 'dominant-baseline':'central' }, label));
});

// ─── DRAW SLOTS ───────────────────────────────────────────
SLOTS.forEach(([id,x,y,w,h,type]) => {
  app(el('rect', { x, y, width:w, height:h, class:'slot-r', rx:6 }));
  // Use smaller font for narrow pit slots (w=100)
  const cls = w < 150 ? 'slot-n-sm' : 'slot-n';
  app(el('text', { x: x+w/2, y: y+h/2, class:cls,
                   'text-anchor':'middle', 'dominant-baseline':'central' }, id));
});

// ─── SITE BOUNDARY (drawn last, on top) ───────────────────
app(el('rect', { x:0, y:0, width:2200, height:3400, class:'site-bnd' }));

// ─── ZONE DIRECTION LABELS ────────────────────────────────
// BACK SIDE — top
app(el('text', { x:1100, y:148, class:'zlbl',
                 'text-anchor':'middle', 'dominant-baseline':'central' },
     'BACK SIDE'));

// FRONT SIDE — bottom
app(el('text', { x:1100, y:3360, class:'zlbl',
                 'text-anchor':'middle', 'dominant-baseline':'central' },
     'FRONT SIDE'));

// SOUTH SIDE — left (rotated)
app(el('text', { x:100, y:1700, class:'zlbl',
                 'text-anchor':'middle', 'dominant-baseline':'central',
                 transform:'rotate(-90,100,1700)' },
     'SOUTH SIDE'));

// NORTH SIDE — right (rotated)
app(el('text', { x:2100, y:1700, class:'zlbl',
                 'text-anchor':'middle', 'dominant-baseline':'central',
                 transform:'rotate(90,2100,1700)' },
     'NORTH SIDE'));
</script>
</body>
</html>
