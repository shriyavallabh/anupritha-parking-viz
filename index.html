<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anupritha B — Parking Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #f8fafc;
    color: #0f172a;
    min-height: 100vh;
  }

  .header {
    max-width: 780px;
    margin: 0 auto;
    padding: 36px 24px 20px;
  }
  .header h1 {
    font-size: 1.45rem;
    font-weight: 700;
    letter-spacing: -0.025em;
    color: #0f172a;
  }
  .header p {
    font-size: 0.82rem;
    color: #64748b;
    margin-top: 5px;
    font-weight: 400;
  }
  .header-divider {
    max-width: 780px;
    margin: 0 auto;
    padding: 0 24px;
    border-bottom: 1px solid #e2e8f0;
  }

  .map-wrap {
    max-width: 780px;
    margin: 28px auto 60px;
    padding: 0 24px;
  }

  svg {
    width: 100%;
    height: auto;
    display: block;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    box-shadow: 0 1px 4px rgba(15,23,42,0.06), 0 4px 16px rgba(15,23,42,0.04);
  }

  @media (max-width: 500px) {
    .header { padding: 24px 16px 14px; }
    .map-wrap { padding: 0 12px; margin-top: 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Anupritha B — Parking Plan</h1>
  <p>35 parking slots &middot; Basement layout based on official architectural drawing</p>
</div>
<div class="header-divider"></div>

<div class="map-wrap">
  <svg id="svg" viewBox="0 0 2200 3400" preserveAspectRatio="xMidYMid meet"
       xmlns="http://www.w3.org/2000/svg">
  </svg>
</div>

<script>
// ============================================================
// COORDINATE SYSTEM
// 1 SVG unit = 1 cm  |  100 units = 1 metre
// ViewBox: 2200 x 3400  =  22 m wide x 34 m deep
//
// Key y bands:
//   0–194    back driveway
//   200–480  back parking (15 pit slots, h=280)
//   640–720  bund wall
//   720–2640 building zone (south + north wall slots embedded)
//   2640–768 front driveway
//   2780–260 front parking (h=480)
//
// Stacked parking = mechanical hydraulic lift; multiple cars share
// one physical footprint at different levels. Shown as a single box
// divided into labelled levels.
// ============================================================

const NS = 'http://www.w3.org/2000/svg';

function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text !== undefined) e.textContent = text;
  return e;
}

const svg = document.getElementById('svg');
function app(e) { svg.appendChild(e); return e; }

// ─── STYLES ───────────────────────────────────────────────
app(el('style', {}, `
  .bg        { fill: #ffffff; }
  .site-bnd  { fill: none; stroke: #cbd5e1; stroke-width: 18; }
  .dwy       { fill: #f8fafc; }
  .dwy-txt   { font: 600 54px/1 Inter,system-ui; fill: #94a3b8; letter-spacing: 5px; }
  .bund      { fill: url(#hatch); stroke: #e2e8f0; stroke-width: 6; }
  .bldg-bg   { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 18; }
  .bldg-name { font: 700 105px/1 Inter,system-ui; fill: #334155; letter-spacing: 1px; }
  .bldg-sub  { font: 400 58px/1 Inter,system-ui; fill: #94a3b8; }
  .pg-pit    { fill: #eff6ff; stroke: #93c5fd; stroke-width: 10; stroke-dasharray: 26 13; }
  .pg-conv   { fill: #f0fdf4; stroke: #86efac; stroke-width: 10; stroke-dasharray: 26 13; }
  .pg-stack  { fill: #fffbeb; stroke: #fbbf24; stroke-width: 10; stroke-dasharray: 26 13; }
  .pg-puzzle { fill: #f5f3ff; stroke: #a78bfa; stroke-width: 10; stroke-dasharray: 26 13; }
  .slot-r    { fill: #ffffff; stroke: #94a3b8; stroke-width: 14; }
  .slot-n    { font: 700 72px/1 Inter,system-ui; fill: #1e293b; }
  .slot-n-sm { font: 700 56px/1 Inter,system-ui; fill: #1e293b; }
  .zlbl      { font: 700 62px/1 Inter,system-ui; fill: #94a3b8; letter-spacing: 6px; }
  .pg-type   { font: 600 44px/1 Inter,system-ui; fill: #94a3b8; letter-spacing: 1px; }
  .stk-div   { stroke: #cbd5e1; stroke-width: 5; stroke-dasharray: 14 7; }
`));

// ─── HATCH PATTERN ────────────────────────────────────────
const defs = el('defs', {});
const pat  = el('pattern', { id:'hatch', width:22, height:22,
                              patternUnits:'userSpaceOnUse', patternTransform:'rotate(45)' });
pat.appendChild(el('line', { x1:0, y1:0, x2:0, y2:22, stroke:'#cbd5e1', 'stroke-width':5 }));
defs.appendChild(pat);
app(defs);

// ─── BACKGROUND ───────────────────────────────────────────
app(el('rect', { x:0, y:0, width:2200, height:3400, class:'bg' }));

// ─── BACK DRIVEWAY ────────────────────────────────────────
app(el('rect', { x:0, y:0, width:2200, height:194, class:'dwy' }));
app(el('text', { x:1100, y:108, class:'dwy-txt', 'text-anchor':'middle',
                 'dominant-baseline':'central' },
       'ELEVATION-3  —  DRIVE WAY'));

// ─── BUND WALL ────────────────────────────────────────────
app(el('rect', { x:300, y:640, width:1600, height:80, class:'bund' }));

// ─── BUILDING CORE ────────────────────────────────────────
app(el('rect', { x:300, y:720, width:1600, height:1920, class:'bldg-bg' }));
app(el('text', { x:1100, y:1510, class:'bldg-name',
                 'text-anchor':'middle', 'dominant-baseline':'central' },
     'ANUPRITHA B'));
app(el('text', { x:1100, y:1635, class:'bldg-sub',
                 'text-anchor':'middle', 'dominant-baseline':'central' },
     'Residential Building'));

// ─── FRONT DRIVEWAY ───────────────────────────────────────
app(el('rect', { x:0, y:2640, width:2200, height:128, class:'dwy' }));
app(el('text', { x:1100, y:2707, class:'dwy-txt', 'text-anchor':'middle',
                 'dominant-baseline':'central' },
       'DRIVE WAY  —  FRONT ENTRY'));

// ─── RENDER HELPERS ───────────────────────────────────────

// Single slot box + centred number
function renderSlot(id, x, y, w, h) {
  app(el('rect', { x, y, width:w, height:h, class:'slot-r', rx:6 }));
  const cls = w < 150 ? 'slot-n-sm' : 'slot-n';
  app(el('text', { x: x+w/2, y: y+h/2, class:cls,
                   'text-anchor':'middle', 'dominant-baseline':'central' }, id));
}

// Stacked parking group — single physical footprint, multiple hydraulic levels.
// Rendered as one tall box divided into per-level slot boxes.
function renderStack(ids, x, y, w, totalH, type) {
  const n   = ids.length;
  const lvH = totalH / n;
  // Outer group border
  app(el('rect', { x, y, width:w, height:totalH, class:`pg-${type}`, rx:10 }));
  // Per-level slot boxes
  ids.forEach((id, i) => {
    renderSlot(id, x+6, y + i*lvH + 6, w-12, lvH-12);
  });
  // Divider lines between levels
  for (let i = 1; i < n; i++) {
    const divY = Math.round(y + i*lvH);
    app(el('line', { x1:x+20, y1:divY, x2:x+w-20, y2:divY, class:'stk-div' }));
  }
}

// ─── BACK ROW — 5 pit groups × 3 slots (slots 1–15) ──────
// Each M-3 bay = 300 units wide, 3 pit slots of 100 each.
// Group borders
[294, 594, 894, 1194, 1494].forEach(gx =>
  app(el('rect', { x:gx, y:194, width:312, height:296, class:'pg-pit', rx:10 })));
// Slots — uniform 100 × 280
for (let i = 0; i < 15; i++) {
  renderSlot(i+1, 300 + i*100, 200, 100, 280);
}

// ─── SOUTH SIDE (left wall, x = 0) ───────────────────────
// Conventional pair: 34, 35
app(el('rect', { x:0, y:720, width:300, height:590, class:'pg-conv', rx:10 }));
renderSlot(34,  6,  740, 288, 260);
renderSlot(35,  6, 1030, 288, 260);
// ~600-unit gap = staircase / toilet block zone (~6 m)
// Stack: 16 + 17 (two hydraulic levels)
renderStack([16,17], 0, 1900, 300, 540, 'stack');

// ─── NORTH SIDE (right wall, x = 1900) ───────────────────
// Conventional: 33 (single)
app(el('rect', { x:1900, y:720, width:300, height:296, class:'pg-conv', rx:10 }));
renderSlot(33, 1906, 740, 288, 260);
// Stack: 30, 31, 32 (three levels)
renderStack([30,31,32], 1900, 1100, 300, 800, 'stack');
// Stack: 27, 28, 29 (three levels) — ends flush with front driveway
renderStack([27,28,29], 1900, 2000, 300, 640, 'stack');

// ─── FRONT ROW ────────────────────────────────────────────
// Centred between x=300 (south zone end) and x=1900 (north zone start).
// Left-to-right: Stack A (18-20) | Puzzle B (21-23) | Stack C (24-26)

// Stack A: 18 + 19 + 20
renderStack([18,19,20], 410, 2780, 220, 480, 'stack');

// Puzzle group border + individual slots
app(el('rect', { x:740, y:2770, width:720, height:500, class:'pg-puzzle', rx:10 }));
renderSlot(21,  750, 2780, 220, 480);
renderSlot(22,  990, 2780, 220, 480);
renderSlot(23, 1230, 2780, 220, 480);

// Stack C: 24 + 25 + 26
renderStack([24,25,26], 1570, 2780, 220, 480, 'stack');

// ─── SITE BOUNDARY (drawn last, on top) ───────────────────
app(el('rect', { x:0, y:0, width:2200, height:3400, class:'site-bnd' }));

// ─── ZONE DIRECTION LABELS ────────────────────────────────
app(el('text', { x:1100, y:148, class:'zlbl',
                 'text-anchor':'middle', 'dominant-baseline':'central' },
     'BACK SIDE'));
app(el('text', { x:1100, y:3360, class:'zlbl',
                 'text-anchor':'middle', 'dominant-baseline':'central' },
     'FRONT SIDE'));
app(el('text', { x:100, y:1700, class:'zlbl',
                 'text-anchor':'middle', 'dominant-baseline':'central',
                 transform:'rotate(-90,100,1700)' },
     'SOUTH SIDE'));
app(el('text', { x:2100, y:1700, class:'zlbl',
                 'text-anchor':'middle', 'dominant-baseline':'central',
                 transform:'rotate(90,2100,1700)' },
     'NORTH SIDE'));
</script>
</body>
</html>
